{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Easy Africa — Websites, Mobile Apps, Software, Branding, IT Solutions{% endblock %}</title>

<meta property="og:type" content="website">
<meta property="og:title" content="{% block og_title %}Easy Africa{% endblock %}">
<meta property="og:description" content="{% block og_description %}Digital infrastructure for Africa's next generation of business.{% endblock %}">
<meta property="og:image" content="{% static 'assets/og-share-image.png' %}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% block twitter_title %}Easy Africa{% endblock %}">
<meta name="twitter:description" content="{% block twitter_description %}Digital infrastructure for Africa's next generation of business.{% endblock %}">
<meta name="twitter:image" content="{% static 'assets/og-share-image.png' %}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" sizes="16x16" href="{% static 'assets/favicon-16.png' %}">
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'assets/favicon-32.png' %}">
<link rel="icon" type="image/png" sizes="192x192" href="{% static 'assets/favicon-192.png' %}">
<link rel="icon" type="image/png" sizes="512x512" href="{% static 'assets/favicon-512.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static 'assets/apple-touch-icon.png' %}">

<link rel="stylesheet" href="{% static 'css/style.css' %}">
{% block extra_css %}{% endblock %}
</head>
<body>

{% include "mysite/_nav.html" %}

{% block content %}

{% endblock %}

{% include "mysite/_footer.html" %}

<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
